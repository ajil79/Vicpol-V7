<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vicpol V7</title>
  <meta name="description" content="Vicpol V7 — deployed and live." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b1220'/%3E%3Ctext x='50' y='68' font-size='58' font-family='Arial,sans-serif' font-weight='700' fill='%233b82f6' text-anchor='middle'%3EV7%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #06090f;
      --panel: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8edf5;
      --muted: #8a97ab;
      --accent: #3b82f6;
      --accent-2: #22d3ee;
      --ok: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #12203a 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .card {
      width: 100%;
      max-width: 620px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      text-align: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--ok);
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.25);
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 28px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
      70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }
    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(40px, 9vw, 68px);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(120deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 18px;
    }
    p.lede {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
      max-width: 460px;
      margin: 0 auto 32px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .chip {
      font-size: 13px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 10px;
    }
    .chip b { color: var(--accent-2); font-weight: 600; }
    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <span class="badge"><span class="dot"></span> Deployment live</span>
      <div class="logo">Vicpol</div>
      <h1>Vicpol&nbsp;V7</h1>
      <p class="lede">
        Your deployment is up and serving. This is the starting point for
        Vicpol&nbsp;V7 — replace this page with your application whenever
        you're ready.
      </p>
      <div class="meta">
        <span class="chip">Version <b>7</b></span>
        <span class="chip">Hosted on <b>Vercel</b></span>
        <span class="chip">Status <b>Ready</b></span>
      </div>
    </section>
  </main>
  <footer>Vicpol V7 &middot; deployed with Vercel</footer>
</body>
</html>
